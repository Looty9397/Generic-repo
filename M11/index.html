<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinding Visualizer</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <table id="graph"></table>
    <div id="options">
        <div style="display: inline-block;">
            <p>Start Point</p>
            <p>End Point</p>
            <p>Dimensions</p>
            <p>Algorithm</p>
        </div>
        <div style="display: inline-block;">
            <p>(<input type="number" placeholder="x" class="smallInput" id="sx">,
            <input type="number" placeholder="y" class="smallInput" id="sy">)</p>
            <p>(<input type="number" placeholder="x" class="smallInput" id="ex">,
            <input type="number" placeholder="y" class="smallInput" id="ey">)</p>
            <p><input type="number" placeholder="w" class="smallInput" id="dx"> x
            <input type="number" placeholder="h" class="smallInput" id="dy"></p>
            <label><input type="radio" name="algo" value="bfs" id="bfs" checked="true">BFS</label>
            <label><input type="radio" name="algo" value="astar" id="astar">A*</label>
        </div>
        <div style="display: inline-block;">
            <p><button id="randomS">Random</button></p>
            <p><button id="randomE">Random</button></p>
            <p><button id="randomD">Random</button></p>
            <p><button id="randomA">Random</button></p>
        </div><br/>
        <button id="generate">Generate Path</button></button><span id="info"></span>
    </div>
</body>
</html>
